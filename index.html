<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sammamish, WA - Time &amp; Weather</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
      background: #0d1b2a;
    }
    * { -webkit-box-sizing: border-box; box-sizing: border-box; }

    /* ── Background layers ── */
    .bg-layer {
      position: fixed;
      top: 0; right: 0; bottom: 0; left: 0;
      -webkit-background-size: cover;
      background-size: cover;
      background-position: center center;
      opacity: 0;
      -webkit-transition: opacity 3s ease-in-out;
      -moz-transition: opacity 3s ease-in-out;
      transition: opacity 3s ease-in-out;
      z-index: 0;
    }
    .bg-layer.visible { opacity: 1; }

    .bg-overlay {
      position: fixed;
      top: 0; right: 0; bottom: 0; left: 0;
      background: -webkit-linear-gradient(top left, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.78) 100%);
      background: linear-gradient(to bottom right, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.78) 100%);
      z-index: 1;
    }

    /* ── Corner widget ── */
    .widget {
      position: fixed;
      bottom: 48px;
      right: 52px;
      z-index: 2;
      color: #ffffff;
      text-align: right;
      text-shadow: 0 1px 6px rgba(0,0,0,0.65), 0 2px 20px rgba(0,0,0,0.45);
    }

    /* ── Weather row ── */
    .w-top {
      display: -webkit-box;
      display: -webkit-flex;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      -ms-flex-align: center;
      align-items: center;
      -webkit-box-pack: end;
      -webkit-justify-content: flex-end;
      -ms-flex-pack: end;
      justify-content: flex-end;
      margin-bottom: 4px;
    }
    .w-icon {
      font-size: 2.6em;
      line-height: 1;
      margin-left: 12px;
    }
    .w-temps {
      display: -webkit-box;
      display: -webkit-flex;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-box-direction: normal;
      -webkit-flex-direction: column;
      -ms-flex-direction: column;
      flex-direction: column;
      -webkit-box-align: end;
      -webkit-align-items: flex-end;
      -ms-flex-align: end;
      align-items: flex-end;
    }
    .w-temp-main {
      font-size: 2.2em;
      font-weight: 700;
      line-height: 1.1;
    }
    .w-temp-sub {
      font-size: 1.05em;
      font-weight: 400;
      opacity: 0.72;
      line-height: 1.3;
    }
    .w-desc {
      font-size: 0.95em;
      font-weight: 500;
      opacity: 0.88;
      margin-bottom: 6px;
    }
    .w-meta {
      font-size: 0.82em;
      opacity: 0.68;
      margin-bottom: 20px;
    }
    .w-meta-sep { margin: 0 8px; opacity: 0.4; }

    /* ── Divider ── */
    .rule {
      height: 1px;
      background: rgba(255,255,255,0.28);
      margin-bottom: 16px;
    }

    /* ── Clock ── */
    .time-line {
      font-size: 5.2em;
      font-weight: 800;
      line-height: 1;
      display: -webkit-box;
      display: -webkit-flex;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-pack: end;
      -webkit-justify-content: flex-end;
      -ms-flex-pack: end;
      justify-content: flex-end;
      -webkit-box-align: baseline;
      -webkit-align-items: baseline;
      -ms-flex-align: baseline;
      align-items: baseline;
    }
    /* Fixed-width segments — digit changes never shift neighbours */
    .t-seg {
      display: inline-block;
      width: 1.35em;
      text-align: center;
    }
    .t-colon {
      display: inline-block;
      width: 0.28em;
      text-align: center;
      opacity: 0.45;
      position: relative;
      top: -0.04em;
    }
    .t-ap {
      display: inline-block;
      font-size: 0.3em;
      font-weight: 600;
      -webkit-align-self: flex-end;
      align-self: flex-end;
      margin-left: 6px;
      margin-bottom: 0.55em;
      opacity: 0.82;
      min-width: 2.2em;
      text-align: left;
    }
    .date-line {
      font-size: 1.15em;
      font-weight: 400;
      opacity: 0.88;
      margin-top: 6px;
    }
    .location-line {
      font-size: 0.72em;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.48;
      margin-top: 5px;
    }

    /* ── Status & bg-label ── */
    .status {
      position: fixed;
      bottom: 14px;
      left: 20px;
      z-index: 2;
      color: rgba(255,255,255,0.32);
      font-size: 0.65em;
      letter-spacing: 0.06em;
      font-family: Arial, sans-serif;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .bg-label {
      position: fixed;
      bottom: 32px;
      left: 20px;
      z-index: 2;
      color: rgba(255,255,255,0.4);
      font-size: 0.68em;
      letter-spacing: 0.08em;
      font-family: Arial, sans-serif;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    /* ── Loading pulse ── */
    @-webkit-keyframes pulse {
      0%, 100% { opacity: 0.85; }
      50%       { opacity: 0.28; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.85; }
      50%       { opacity: 0.28; }
    }
    .loading {
      -webkit-animation: pulse 1.6s ease-in-out infinite;
      animation: pulse 1.6s ease-in-out infinite;
    }

    /* ── Mobile responsive ── */
    @media only screen and (max-width: 1024px) {
      .widget      { bottom: 36px; right: 36px; }
      .time-line   { font-size: 4.2em; }
      .w-temp-main { font-size: 1.9em; }
      .w-icon      { font-size: 2.2em; }
    }

    @media only screen and (max-width: 768px) {
      .widget      { bottom: 24px; right: 20px; }
      .time-line   { font-size: 3.4em; }
      .t-seg       { width: 1.3em; }
      .w-temp-main { font-size: 1.6em; }
      .w-temp-sub  { font-size: 0.92em; }
      .w-icon      { font-size: 1.9em; }
      .w-desc      { font-size: 0.88em; }
      .w-meta      { font-size: 0.76em; }
      .date-line   { font-size: 1em; }
      .location-line { font-size: 0.65em; letter-spacing: 0.1em; }
    }

    @media only screen and (max-width: 540px) {
      .widget      { bottom: 16px; right: 14px; }
      .time-line   { font-size: 2.8em; }
      .t-seg       { width: 1.25em; }
      .t-ap        { font-size: 0.32em; margin-bottom: 0.45em; }
      .w-temp-main { font-size: 1.4em; }
      .w-temp-sub  { font-size: 0.85em; }
      .w-icon      { font-size: 1.7em; }
      .w-meta-sep  { margin: 0 5px; }
      .w-meta      { font-size: 0.72em; }
      .date-line   { font-size: 0.9em; }
      .location-line { font-size: 0.6em; }
    }

    @media only screen and (max-width: 380px) {
      .widget      { bottom: 12px; right: 10px; }
      .time-line   { font-size: 2.2em; }
      .t-seg       { width: 1.2em; }
      .t-ap        { font-size: 0.34em; }
      .w-top       { -webkit-box-orient: vertical; -webkit-box-direction: normal;
                     -webkit-flex-direction: column; -ms-flex-direction: column;
                     flex-direction: column; -webkit-box-align: end;
                     -webkit-align-items: flex-end; -ms-flex-align: end;
                     align-items: flex-end; }
      .w-icon      { margin-left: 0; margin-bottom: 4px; font-size: 1.6em; }
      .w-temp-main { font-size: 1.3em; }
      .w-temp-sub  { font-size: 0.8em; }
      .w-desc      { font-size: 0.8em; }
      .w-meta      { font-size: 0.68em; }
      .w-meta-sep  { display: none; }
      .date-line   { font-size: 0.82em; }
      .location-line { display: none; }
      .bg-label    { display: none; }
      .rule        { margin-bottom: 10px; }
    }
  </style>
</head>
<body>

  <div class="bg-layer" id="bg-a"></div>
  <div class="bg-layer" id="bg-b"></div>
  <div class="bg-overlay"></div>

  <div class="widget">
    <!-- Weather -->
    <div class="w-top">
      <div class="w-icon" id="weather-icon">...</div>
      <div class="w-temps">
        <div class="w-temp-main" id="temp-c">-- C</div>
        <div class="w-temp-sub"  id="temp-f">-- F</div>
      </div>
    </div>
    <div class="w-desc" id="weather-desc">Fetching weather...</div>
    <div class="w-meta">
      Humidity: <span id="humidity">--</span>%
      <span class="w-meta-sep">|</span>
      Wind: <span id="wind">--</span> mph
      <span class="w-meta-sep">|</span>
      Feels: <span id="feels-like">--</span>
    </div>

    <div class="rule"></div>

    <!-- Clock — each segment is a fixed-width span -->
    <div class="time-line loading" id="time-line"><span class="t-seg" id="t-h">--</span><span class="t-colon">:</span><span class="t-seg" id="t-m">--</span><span class="t-colon">:</span><span class="t-seg" id="t-s">--</span><span class="t-ap" id="t-ap">--</span></div>
    <div class="date-line"    id="date-line">-</div>
    <div class="location-line">Sammamish, WA &mdash; Pacific Time</div>
  </div>

  <div class="bg-label" id="bg-label"></div>
  <div class="status"   id="status">Connecting...</div>

  <script>
    /* ─────────────────────────────────────────────
       All code is ES5-compatible:
       - var instead of const/let
       - function() instead of arrow functions
       - XMLHttpRequest instead of fetch
       - string concatenation instead of template literals
       - no async/await, no ??, no padStart, no numeric separators
    ───────────────────────────────────────────── */

    function pad2(n) { return n < 10 ? '0' + n : '' + n; }

    function setText(id, val) {
      var el = document.getElementById(id);
      if (!el) return;
      if (typeof el.textContent !== 'undefined') { el.textContent = val; }
      else { el.innerText = val; }
    }

    function addCls(el, cls) {
      if ((' ' + el.className + ' ').indexOf(' ' + cls + ' ') < 0) {
        el.className = (el.className + ' ' + cls).replace(/^\s+|\s+$/g, '');
      }
    }
    function remCls(el, cls) {
      el.className = (' ' + el.className + ' ')
        .replace(new RegExp(' ' + cls + ' ', 'g'), ' ')
        .replace(/^\s+|\s+$/g, '');
    }

    function xhrGet(url, onOk, onErr) {
      var xhr;
      try { xhr = new XMLHttpRequest(); } catch(e) { onErr(e); return; }
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;
        if (xhr.status === 200) {
          try { onOk(JSON.parse(xhr.responseText)); }
          catch(e) { onErr(e); }
        } else {
          onErr(new Error('HTTP ' + xhr.status));
        }
      };
      try { xhr.open('GET', url, true); xhr.send(); }
      catch(e) { onErr(e); }
    }


    /* ════════════════════════════════════════════
       BACKGROUND — cycles every 5 minutes
    ════════════════════════════════════════════ */
    var BG_LIST = [
      { url: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1920&q=80', label: 'Temperate Forest' },
      { url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80', label: 'Mountain Vista' },
      { url: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1920&q=80', label: 'Sandy Beach' },
      { url: 'https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=1920&q=80', label: 'Wildflower Meadow' },
      { url: 'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1920&q=80', label: 'Mountain Sunrise' },
      { url: 'https://images.unsplash.com/photo-1516912481808-3406841bd33c?w=1920&q=80', label: 'Winter Forest' },
      { url: 'https://images.unsplash.com/photo-1432405972618-c60b0225b8f9?w=1920&q=80', label: 'Coastal Cliffs' },
      { url: 'https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=1920&q=80', label: 'Blossom Valley' },
      { url: 'https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=1920&q=80', label: 'Lake Reflection' },
      { url: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1920&q=80', label: 'Rocky Peaks' }
    ];

    var bgIndex = Math.floor(Math.random() * BG_LIST.length);
    var bgUseA  = true;
    var bgElA   = document.getElementById('bg-a');
    var bgElB   = document.getElementById('bg-b');

    function showBg(idx) {
      var item = BG_LIST[idx % BG_LIST.length];
      var next = bgUseA ? bgElA : bgElB;
      var prev = bgUseA ? bgElB : bgElA;
      next.style.backgroundImage = "url('" + item.url + "')";
      addCls(next, 'visible');
      remCls(prev, 'visible');
      setText('bg-label', item.label);
      bgUseA = !bgUseA;
    }

    showBg(bgIndex);
    setInterval(function() {
      bgIndex = (bgIndex + 1) % BG_LIST.length;
      showBg(bgIndex);
    }, 300000);


    /* ════════════════════════════════════════════
       CLOCK — timeapi.io (CORS-safe), falls back to browser
       Response gives PST fields directly; stored as fake-UTC
       so getUTC*() returns correct PST values regardless of
       whatever timezone the TV itself is set to.
    ════════════════════════════════════════════ */
    var DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

    var serverMs  = null;
    var fetchedAt = null;
    var clockTick = null;

    function tickClock() {
      var h, mi, s, wd, mo, dt, yr;
      if (serverMs !== null) {
        /* serverMs stores PST time encoded as fake-UTC — use getUTC* */
        var now = new Date(serverMs + ((new Date()).getTime() - fetchedAt));
        h  = now.getUTCHours();
        mi = now.getUTCMinutes();
        s  = now.getUTCSeconds();
        wd = now.getUTCDay();
        mo = now.getUTCMonth();
        dt = now.getUTCDate();
        yr = now.getUTCFullYear();
      } else {
        /* Intl timezone fallback for browser clock */
        var now2;
        try {
          var pst = new Date().toLocaleString('en-US', { timeZone: 'America/Los_Angeles' });
          var d   = new Date(pst);
          now2 = isNaN(d.getTime()) ? new Date() : d;
        } catch(e) {
          now2 = new Date();
        }
        h  = now2.getHours();
        mi = now2.getMinutes();
        s  = now2.getSeconds();
        wd = now2.getDay();
        mo = now2.getMonth();
        dt = now2.getDate();
        yr = now2.getFullYear();
      }

      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      setText('date-line', DAYS[wd] + ', ' + MONTHS[mo] + ' ' + dt + ', ' + yr);
      setText('t-h',  String(h));
      setText('t-m',  pad2(mi));
      setText('t-s',  pad2(s));
      setText('t-ap', ampm);
    }

    function startBrowserClock() {
      remCls(document.getElementById('time-line'), 'loading');
      if (!clockTick) { clockTick = setInterval(tickClock, 1000); }
      tickClock();
    }

    function fetchTime() {
      /* timeapi.io returns PST time fields directly — no CORS issues */
      xhrGet(
        'https://timeapi.io/api/time/current/zone?timeZone=America%2FLos_Angeles',
        function(data) {
          /* Encode PST time as fake-UTC ms so getUTC*() gives correct PST values */
          serverMs  = Date.UTC(data.year, data.month - 1, data.day,
                               data.hour, data.minute, data.seconds);
          fetchedAt = (new Date()).getTime();
          remCls(document.getElementById('time-line'), 'loading');
          if (!clockTick) { clockTick = setInterval(tickClock, 1000); }
          tickClock();
        },
        function() {
          if (serverMs === null) { startBrowserClock(); }
          setTimeout(fetchTime, 30000);
        }
      );
    }

    startBrowserClock();   /* show browser time immediately while API loads */
    fetchTime();
    setInterval(fetchTime, 600000); /* re-sync every 10 min */


    /* ════════════════════════════════════════════
       WEATHER — Open-Meteo, free, no API key
       Sammamish WA: 47.6162N, 122.0356W
    ════════════════════════════════════════════ */
    var WMO = {
       0: { label: 'Clear Sky',              sym: 'Clear'       },
       1: { label: 'Mainly Clear',           sym: 'Mostly Clear'},
       2: { label: 'Partly Cloudy',          sym: 'Pt. Cloudy'  },
       3: { label: 'Overcast',               sym: 'Overcast'    },
      45: { label: 'Foggy',                  sym: 'Fog'         },
      48: { label: 'Icy Fog',                sym: 'Icy Fog'     },
      51: { label: 'Light Drizzle',          sym: 'Drizzle'     },
      53: { label: 'Moderate Drizzle',       sym: 'Drizzle'     },
      55: { label: 'Heavy Drizzle',          sym: 'Drizzle'     },
      56: { label: 'Freezing Drizzle',       sym: 'Fr. Drizzle' },
      57: { label: 'Freezing Drizzle',       sym: 'Fr. Drizzle' },
      61: { label: 'Light Rain',             sym: 'Rain'        },
      63: { label: 'Moderate Rain',          sym: 'Rain'        },
      65: { label: 'Heavy Rain',             sym: 'Rain'        },
      66: { label: 'Freezing Rain',          sym: 'Fr. Rain'    },
      67: { label: 'Freezing Rain',          sym: 'Fr. Rain'    },
      71: { label: 'Light Snow',             sym: 'Snow'        },
      73: { label: 'Moderate Snow',          sym: 'Snow'        },
      75: { label: 'Heavy Snow',             sym: 'Snow'        },
      77: { label: 'Snow Grains',            sym: 'Snow'        },
      80: { label: 'Light Showers',          sym: 'Showers'     },
      81: { label: 'Rain Showers',           sym: 'Showers'     },
      82: { label: 'Violent Showers',        sym: 'Showers'     },
      85: { label: 'Snow Showers',           sym: 'Snow'        },
      86: { label: 'Heavy Snow Showers',     sym: 'Snow'        },
      95: { label: 'Thunderstorm',           sym: 'Storm'       },
      96: { label: 'Thunderstorm + Hail',    sym: 'Storm'       },
      99: { label: 'Thunderstorm + Hail',    sym: 'Storm'       }
    };

    /* Unicode weather symbols — visible on Samsung TV WebKit without emoji support issues */
    var SYM_MAP = {
      'Clear':        '\u2600',      /* ☀ */
      'Mostly Clear': '\u26C5',      /* ⛅ */
      'Pt. Cloudy':   '\u26C5',      /* ⛅ */
      'Overcast':     '\u2601',      /* ☁ */
      'Fog':          '\u2592',      /* ▒ fog block */
      'Icy Fog':      '\u2592',
      'Drizzle':      '\u2614',      /* ☔ */
      'Fr. Drizzle':  '\u2744',      /* ❄ */
      'Rain':         '\u2614',      /* ☔ */
      'Fr. Rain':     '\u2744',
      'Snow':         '\u2744',      /* ❄ */
      'Showers':      '\u2614',
      'Storm':        '\u26A1',      /* ⚡ */
      'Unknown':      '\u2753'
    };

    function fetchWeather() {
      xhrGet(
        'https://api.open-meteo.com/v1/forecast' +
        '?latitude=47.6162&longitude=-122.0356' +
        '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m' +
        '&temperature_unit=celsius&wind_speed_unit=mph&timezone=America%2FLos_Angeles',
        function(data) {
          var cur    = data.current;
          var tempC  = Math.round(cur.temperature_2m);
          var tempF  = Math.round(tempC * 9 / 5 + 32);
          var feelsC = Math.round(cur.apparent_temperature);
          var feelsF = Math.round(feelsC * 9 / 5 + 32);
          var code   = cur.weather_code;
          var wmo    = WMO.hasOwnProperty(code) ? WMO[code] : { label: 'Unknown', sym: 'Unknown' };
          var sym    = SYM_MAP.hasOwnProperty(wmo.sym) ? SYM_MAP[wmo.sym] : wmo.sym;

          setText('weather-icon', sym);
          setText('weather-desc', wmo.label);
          setText('temp-c', tempC + '\u00B0C');
          setText('temp-f', tempF + '\u00B0F');
          setText('humidity',   String(cur.relative_humidity_2m));
          setText('wind',       String(Math.round(cur.wind_speed_10m)));
          setText('feels-like', feelsC + '\u00B0C / ' + feelsF + '\u00B0F');
          setText('status', 'Weather updated');
        },
        function() {
          setText('weather-desc', 'Weather unavailable');
          setText('status', 'Weather fetch failed - will retry');
        }
      );
    }

    fetchWeather();
    setInterval(fetchWeather, 900000); /* 15 min */
  </script>
</body>
</html>
